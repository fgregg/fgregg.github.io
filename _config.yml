# Canonical site origin. Used for absolute URLs in og: tags and the Atom feed;
# without it `{{ site.url }}` is empty, so og:url renders as a relative path.
url: https://slownews.bunkum.us

plugins:
  - jekyll-feed

include: [ _headers, .well-known ]

# Jekyll's default excludes (re-listed, because setting `exclude` REPLACES the
# defaults rather than extending them), plus bin/ — a dev-only build helper
# script that shouldn't be published into _site.
exclude:
  - .sass-cache
  - .jekyll-cache
  - gemfiles
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - bin

feed:
  tags: true

# Standard.Site syndication (see _plugins/standard_site.rb, _atproto/).
standard_site:
  did: did:plc:jwcnmli4jkle63x4oqouiylu
  pub_rkey: slow-news # matches PUBLICATION_RKEY in _atproto/records.js
