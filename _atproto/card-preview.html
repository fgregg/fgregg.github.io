<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Standard.Site card preview — Notes on Labor Data</title>
  <!--
    Local mock of the publication card to eyeball the basicTheme palette + icon
    BEFORE publishing. The palette here must mirror _atproto/records.js
    (basicTheme). This is an approximation: real cards render in standard.site
    readers (leaflet.pub / pckt.blog / offprint.app) once records are published.
  -->
  <style>
    :root {
      /* Keep in sync with basicTheme in records.js */
      --background: rgb(250, 250, 247);
      --foreground: rgb(21, 17, 13);
      --accent: rgb(192, 2, 62);
      --accent-foreground: rgb(255, 255, 255);
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #c9c9c4;
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
    }
    .card {
      width: 380px;
      background: var(--background);
      color: var(--foreground);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
      overflow: hidden;
    }
    .card-body { padding: 24px; }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%; /* avatars are masked to a circle */
      display: block;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    .name {
      margin: 16px 0 6px;
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.2;
    }
    .description {
      margin: 0 0 20px;
      font-size: 0.95rem;
      line-height: 1.45;
      opacity: 0.85;
    }
    .button {
      display: inline-block;
      background: var(--accent);
      color: var(--accent-foreground);
      padding: 9px 18px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
    }
    .swatches {
      display: flex;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
    }
    .swatches span {
      flex: 1;
      height: 28px;
      font-size: 9px;
      color: #fff;
      mix-blend-mode: difference;
      display: grid;
      place-items: center;
      font-family: ui-monospace, monospace;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-body">
      <img class="icon" src="./icon.png" alt="Notes on Labor Data icon">
      <h1 class="name">Notes on Labor Data</h1>
      <p class="description">Notes on labor data from the Labordata project.</p>
      <a class="button" href="#">Follow</a>
    </div>
    <div class="swatches">
      <span style="background: rgb(250,250,247); color:#000;">bg</span>
      <span style="background: rgb(21,17,13);">fg</span>
      <span style="background: rgb(192,2,62);">accent</span>
      <span style="background: rgb(255,255,255); color:#000;">accentFg</span>
    </div>
  </div>
</body>
</html>
